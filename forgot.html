<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset | OWD Portal</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="owd-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="top">
    <img src="owd-logo.png" alt="OWD Logo" class="logo-img">
  </div>
  
  <div class="container">
    <h1>Reset Password</h1>
    <p class="subtitle">Secure your OWD Portal access 🔒</p>
    
    <form action="login.html">
      <input type="email" placeholder="Enter your email" required>
      <button type="submit" class="btn">Send Reset Link</button>
    </form>
    
    <p class="switch-page">Remembered your password? <a href="login.html">Login</a></p>
  </div>
</body>
</html>
