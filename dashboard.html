<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard | OLAYIWOLA</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />

  <style>
    .dashboard {
      padding: 30px;
      max-width: 900px;
      margin: auto;
      text-align: center;
    }

    .welcome {
      font-size: 1.5em;
      font-weight: 600;
      color: #322C84;
      margin-top: 20px;
    }

    .nav-bar {
      background-color: #322C84;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 1.2em;
      font-weight: 500;
      border-bottom: 4px solid #E8B000;
    }

    .features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 30px;
      gap: 20px;
    }

    .card {
      background: #f8f8f8;
      padding: 20px;
      border-radius: 12px;
      width: 200px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 20px rgba(50, 44, 132, 0.2);
    }

    .logout {
      margin-top: 40px;
      color: #322C84;
    }

    .logout a {
      color: #E8B000;
      text-decoration: underline;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="nav-bar">OLAYIWOLA Web Page Design</div>

  <div class="dashboard">
    <h1 class="welcome" id="welcomeName">Welcome! 👋</h1>
    <p>Your dashboard is ready. Start exploring your tools below.</p>

    <div class="features">
      <div class="card">🛠️ Projects</div>
      <div class="card">🎨 Templates</div>
      <div class="card">📁 File Manager</div>
      <div class="card">📊 Analytics</div>
      <div class="card">🙏 Devotions</div>
    </div>

    <div class="logout">
      Not you? <a href="login.html">Logout</a>
    </div>
  </div>

  <script>
    const name = localStorage.getItem("olayiUser");
    const welcome = document.getElementById("welcomeName");

    if (name) {
      welcome.textContent = `Welcome, ${name}! 👋`;
    } else {
      welcome.textContent = "Welcome, Guest! 👋";
    }
  </script>
</body>
</html>
