<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | OWD Portal</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="owd-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
  
  <nav class="nav-bar">OWD Portal Workspace</nav>

  <main class="dashboard">
    <h1 class="welcome">Welcome! 👋</h1>
    <p>Your workspace is ready. Select a tool to get started.</p>
    
    <div class="features">
      <div class="card active" onclick="switchTab(event, 'projects')"><span>🛠️</span> Projects</div>
      <div class="card" onclick="switchTab(event, 'analytics')"><span>📊</span> Analytics</div>
      <div class="card" onclick="switchTab(event, 'settings')"><span>⚙️</span> Settings</div>
    </div>

    <div id="projects" class="tab-content active-tab">
      <h2>Your Projects</h2>
      <p>No active projects found. Start coding!</p>
    </div>

    <div id="analytics" class="tab-content">
      <h2>Site Analytics</h2>
      <p>Traffic is looking great this week.</p>
    </div>

    <div id="settings" class="tab-content">
      <h2>Account Settings</h2>
      <p>Manage your profile and preferences.</p>
    </div>

    <p class="logout"><a href="login.html">Log Out</a></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
