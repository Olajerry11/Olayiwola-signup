<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | OWD Portal</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="owd-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="top">
    <img src="owd-logo.png" alt="OWD Logo" class="logo-img">
  </div>
  
  <div class="container">
    <h1>Login</h1>
    <p class="subtitle">Welcome back to OWD Portal 👋</p>
    
    <form action="dashboard.html">
      <input type="email" placeholder="Email" required>
      <div class="password-container">
        <input type="password" placeholder="Password" id="password" required>
        <span class="eye-icon" onclick="togglePassword()">👁️</span>
      </div>
      <a href="forgot.html" class="forgot-link">Forgot Password?</a>
      <button type="submit" class="btn">Login</button>
    </form>
    
    <p class="switch-page">Don't have an account? <a href="index.html">Signup</a></p>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
