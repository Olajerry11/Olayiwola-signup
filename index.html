<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Signup | OLAYIWOLA</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="top">
      <img src="olayiwola-logo.png" alt="Olayiwola Logo" class="logo-img">
    </div>

    <div class="form-container">
      <h2>Signup</h2>
      <p class="subtitle">Code with purpose. Design with faith. Build with Olayiwola.</p>

      <form id="signupForm" onsubmit="return handleSignup(event)">
        <input type="text" id="username" placeholder="Username" />
        <small class="error" id="usernameError"></small>

        <input type="email" id="email" placeholder="Email" />
        <small class="error" id="emailError"></small>

        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Password" />
          <span onclick="togglePassword()" class="eye-icon">👁️</span>
        </div>
        <small class="error" id="passwordError"></small>

        <label class="checkbox-label">
          <input type="checkbox" required />
          By creating an account you accept our
          <a href="#">Privacy Policy</a> &amp;
          <a href="#">Terms</a>
        </label>

        <button type="submit">Signup</button>

        <p class="login-text">
          Already have an account?
          <a href="login.html">Login</a>
        </p>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
